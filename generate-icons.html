<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator - Frame Extractor</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to bottom, #1E2235, #0B0F19, #000000);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-transform: uppercase;
            font-weight: 300;
            letter-spacing: 0.15em;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 40px;
        }
        canvas {
            border: 1px solid rgba(255,255,255,0.2);
            margin: 20px;
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
        }
        button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 300;
            letter-spacing: 0.15em;
            font-size: 12px;
            margin: 10px;
            box-shadow: 0 0 40px rgba(255,255,255,0.15), inset 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.5s ease-out;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 50px rgba(255,255,255,0.25), inset 0 0 20px rgba(255,255,255,0.05);
            transform: scale(1.05);
        }
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Frame Extractor Icon Generator</h1>
    <canvas id="icon192" width="192" height="192"></canvas>
    <canvas id="icon512" width="512" height="512"></canvas>
    <div class="buttons">
        <button onclick="downloadIcon('icon192', 'icon-192.png')">Download 192x192</button>
        <button onclick="downloadIcon('icon512', 'icon-512.png')">Download 512x512</button>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const center = size / 2;

            // Background - Marline gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, size);
            gradient.addColorStop(0, '#1E2235');
            gradient.addColorStop(0.5, '#0B0F19');
            gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            // Draw a film frame / viewfinder design
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = size * 0.025;

            // Outer frame
            const frameSize = size * 0.7;
            const frameStart = (size - frameSize) / 2;
            ctx.strokeRect(frameStart, frameStart, frameSize, frameSize);

            // Inner frame (viewfinder)
            const innerSize = size * 0.5;
            const innerStart = (size - innerSize) / 2;
            ctx.strokeRect(innerStart, innerStart, innerSize, innerSize);

            // Corner marks (focus points)
            const cornerLength = size * 0.08;
            const corners = [
                [innerStart, innerStart], // top-left
                [innerStart + innerSize, innerStart], // top-right
                [innerStart, innerStart + innerSize], // bottom-left
                [innerStart + innerSize, innerStart + innerSize] // bottom-right
            ];

            ctx.lineWidth = size * 0.015;
            corners.forEach(([x, y]) => {
                // Horizontal lines
                ctx.beginPath();
                if (x === innerStart) {
                    ctx.moveTo(x - cornerLength, y);
                    ctx.lineTo(x, y);
                } else {
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + cornerLength, y);
                }
                ctx.stroke();

                // Vertical lines
                ctx.beginPath();
                if (y === innerStart) {
                    ctx.moveTo(x, y - cornerLength);
                    ctx.lineTo(x, y);
                } else {
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + cornerLength);
                }
                ctx.stroke();
            });

            // Add subtle glow effect
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            ctx.shadowBlur = size * 0.05;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = size * 0.02;
            ctx.strokeRect(frameStart, frameStart, frameSize, frameSize);
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Generate icons on load
        window.onload = () => {
            drawIcon(document.getElementById('icon192'));
            drawIcon(document.getElementById('icon512'));
        };
    </script>
</body>
</html>
